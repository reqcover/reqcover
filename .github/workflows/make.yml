name: ReqCover CI/CD

on:
  push:
    tags:
      - '*'
    branches: [ trunk ]
  pull_request:
    branches: [ trunk ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v5.0.0
    - uses: actions/setup-java@v5.1.0
      with:
        cache: gradle
        distribution: 'zulu'
        java-version: '21'

    - name: Build and Test
      run: make

    - name: Deploy
      if: startsWith(github.ref, 'refs/tags/')
      run: make publish
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
